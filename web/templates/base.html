<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Central{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand">Central</a>
  <div class="nav-links">
    <a href="/"       class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
    <a href="/ipam"   class="nav-link {% if '/ipam' in request.url.path %}active{% endif %}">IPAM</a>
    <a href="/guide"  class="nav-link {% if '/guide' in request.url.path and '/ipam' not in request.url.path %}active{% endif %}">Guide</a>
    <a href="/import" class="nav-link {% if '/import' in request.url.path %}active{% endif %}">Import</a>
  </div>
</nav>

<main class="container">
  {% block content %}{% endblock %}
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
