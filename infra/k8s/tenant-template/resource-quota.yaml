apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: central-__TENANT_SLUG__
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "50"
    persistentvolumeclaims: "10"
    services: "20"
    count/deployments.apps: "20"
    count/statefulsets.apps: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: central-__TENANT_SLUG__
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 4Gi
