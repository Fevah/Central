---
# Sealed Secrets Controller — encrypts secrets so they can be stored in git.
# Install: kubectl apply -f sealed-secrets.yaml
# Usage:  kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# The controller decrypts SealedSecrets into regular Secrets at runtime.
# Only the controller's private key (stored in K8s) can decrypt them.

apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
---
# Install the Bitnami Sealed Secrets controller via Helm values as YAML.
# In practice, use: helm install sealed-secrets sealed-secrets/sealed-secrets -n sealed-secrets
# This manifest creates the core resources for a manual install.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealed-secrets-controller
  namespace: sealed-secrets
  labels:
    app.kubernetes.io/name: sealed-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sealed-secrets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sealed-secrets
    spec:
      containers:
        - name: controller
          image: bitnami/sealed-secrets-controller:0.36.6
          ports:
            - containerPort: 8080
          args:
            - '--key-prefix=central'
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: sealed-secrets-controller
  namespace: sealed-secrets
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: sealed-secrets

---
# ── Example: Central database credentials as SealedSecret ──
# Generate with: echo -n 'central' | kubectl create secret generic db-creds \
#   --from-literal=username=central --from-literal=password=central \
#   --dry-run=client -o yaml | kubeseal --format yaml

apiVersion: v1
kind: Secret
metadata:
  name: central-db-credentials
  namespace: central
type: Opaque
data:
  # base64 encoded: central / central
  username: Y2VudHJhbA==
  password: Y2VudHJhbA==
  dsn: cG9zdGdyZXNxbDovL2NlbnRyYWw6Y2VudHJhbEBwZ2JvdW5jZXI6NTQzMi9jZW50cmFs

---
apiVersion: v1
kind: Secret
metadata:
  name: central-redis-credentials
  namespace: central
type: Opaque
data:
  url: cmVkaXM6Ly9yZWRpczozNzkuMQ==

---
apiVersion: v1
kind: Secret
metadata:
  name: central-minio-credentials
  namespace: central
type: Opaque
data:
  access-key: bWluaW9hZG1pbg==
  secret-key: bWluaW9hZG1pbg==
