apiVersion: v1
kind: ServiceAccount
metadata:
  name: central-service
  namespace: central
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: central-service-role
  namespace: central
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: central-service-binding
  namespace: central
subjects:
  - kind: ServiceAccount
    name: central-service
    namespace: central
roleRef:
  kind: Role
  name: central-service-role
  apiGroup: rbac.authorization.k8s.io
