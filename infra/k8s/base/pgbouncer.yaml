---
# PgBouncer — Transaction-mode connection pooling for all services
# Sits between services and PostgreSQL, reduces connection churn.
# Services connect to pgbouncer:5432, PgBouncer connects to postgres-0:5432
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: central
data:
  pgbouncer.ini: |
    # ══════════════════════════════════════════════════════════════════════
    # PgBouncer — Transaction mode + per-tier pool sizing
    # ══════════════════════════════════════════════════════════════════════
    # Pool sizes mapped to subscription tiers:
    #   Free         → pool_size=2   (1-2 connections)
    #   Normal/Pro   → pool_size=20  (3-19 default, bump to 20 here)
    #   Professional → pool_size=50  (20-99)
    #   Enterprise   → pool_size=100 (100+)
    # Enterprise tenants with dedicated DBs get their own entry here,
    # provisioned at runtime by the tenant-provisioner service.
    # ══════════════════════════════════════════════════════════════════════

    [databases]
    # Shared (zoned) tenants — all funnel through one pool on the `central` DB
    central = host=postgres-0.postgres.central.svc.cluster.local port=5432 dbname=central pool_size=50 reserve_pool=20
    secure_auth = host=postgres-0.postgres.central.svc.cluster.local port=5432 dbname=secure_auth pool_size=20
    secure_tasks = host=postgres-0.postgres.central.svc.cluster.local port=5432 dbname=central pool_size=30
    secure_storage = host=postgres-0.postgres.central.svc.cluster.local port=5432 dbname=central pool_size=30
    secure_sync = host=postgres-0.postgres.central.svc.cluster.local port=5432 dbname=central pool_size=30
    secure_audit = host=postgres-0.postgres.central.svc.cluster.local port=5432 dbname=central pool_size=10

    # Tier-based pool templates (used when tenant DBs are added programmatically)
    # The tenant-provisioner appends per-tenant entries to this file via ConfigMap update
    # Template patterns: pool_size is set by tier at provision time
    # tier=free    → pool_size=2, reserve=1
    # tier=normal  → pool_size=20, reserve=5  (covers 3-19)
    # tier=pro     → pool_size=50, reserve=15 (covers 20-99)
    # tier=enterprise → pool_size=100, reserve=30

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 2000
    default_pool_size = 20
    min_pool_size = 5
    reserve_pool_size = 10
    reserve_pool_timeout = 3

    # ── Timeouts (30s connection timeout as spec'd) ──
    server_connect_timeout = 15
    server_login_retry = 5
    query_timeout = 0
    query_wait_timeout = 30
    client_idle_timeout = 0
    client_login_timeout = 30
    server_idle_timeout = 600
    server_lifetime = 3600
    idle_transaction_timeout = 300

    # ── Session safety ──
    server_reset_query = DISCARD ALL
    server_check_query = SELECT 1
    server_check_delay = 30
    max_prepared_statements = 100

    # ── Monitoring ──
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    stats_period = 60
    admin_users = central
    stats_users = central, pgbouncer_stats
    server_tls_sslmode = prefer

    # ── Queue depth monitoring ──
    # When waiting client count exceeds 80% of max_client_conn, Prometheus alerts fire
    # (see alertmanager.yaml — PgBouncerHighQueueDepth rule)
    application_name_add_host = 1

  userlist.txt: |
    "central" "central"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: central
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9127"
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          ports:
            - containerPort: 5432
              name: pgbouncer
          volumeMounts:
            - name: config
              mountPath: /bitnami/pgbouncer/conf/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: config
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          env:
            - name: PGBOUNCER_AUTH_TYPE
              value: "md5"
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

        # Prometheus exporter — exposes pool_size, cl_waiting, sv_active etc.
        - name: exporter
          image: prometheuscommunity/pgbouncer-exporter:v0.10.5
          ports:
            - containerPort: 9127
              name: metrics
          env:
            - name: PGBOUNCER_EXPORTER_HOST
              value: "0.0.0.0"
            - name: PGBOUNCER_EXPORTER_PORT
              value: "9127"
            - name: DATA_SOURCE_NAME
              value: "postgres://central:central@127.0.0.1:5432/pgbouncer?sslmode=disable"
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config

---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: central
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: pgbouncer
  selector:
    app: pgbouncer
