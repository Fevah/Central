apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: central

commonLabels:
  app.kubernetes.io/part-of: central-platform

resources:
  - namespace.yaml
  - rbac.yaml
  - resource-quota.yaml
  - configmap.yaml
  - sealed-secrets.yaml
  - postgres.yaml
  - postgres-read.yaml
  - pgbouncer.yaml
  - redis.yaml
  - minio.yaml
  - services.yaml
  - pdb.yaml
  - monitoring.yaml
  - monitoring-nodeports.yaml
  - alertmanager.yaml
  - db-migrations.yaml
  - db-backup.yaml
  - tenant-provisioner.yaml
  - networking-engine.yaml
