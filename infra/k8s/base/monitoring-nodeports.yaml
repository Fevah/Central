---
# NodePort services so observability URLs in CREDENTIALS.md work from Windows host.
# All exposed on master node IP: 192.168.56.10

# Prometheus → 192.168.56.10:30909
apiVersion: v1
kind: Service
metadata:
  name: prometheus-nodeport
  namespace: central
spec:
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30909
      name: http
  selector:
    app: prometheus
---
# Jaeger UI → 192.168.56.10:30686
apiVersion: v1
kind: Service
metadata:
  name: jaeger-nodeport
  namespace: central
spec:
  type: NodePort
  ports:
    - port: 16686
      targetPort: 16686
      nodePort: 30686
      name: ui
  selector:
    app: jaeger
---
# MinIO Console → 192.168.56.10:30901 (S3 API is separate at 9000)
apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: central
spec:
  type: NodePort
  ports:
    - port: 9001
      targetPort: 9001
      nodePort: 30901
      name: console
    - port: 9000
      targetPort: 9000
      nodePort: 30900
      name: s3
  selector:
    app: minio
---
# Grafana already has LoadBalancer at 192.168.56.210 in monitoring.yaml
