apiVersion: v1
kind: ConfigMap
metadata:
  name: central-config
  namespace: central
data:
  # Database (overridden per environment by Kustomize)
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  CENTRAL_DB: "central"
  AUTH_DB: "secure_auth"
  AUDIT_DB: "secure_audit"

  # Redis
  REDIS_URL: "redis://redis:6379"

  # Service ports
  CENTRAL_API_PORT: "5000"
  AUTH_SERVICE_PORT: "8081"
  GATEWAY_PORT: "8000"
  TASK_SERVICE_PORT: "8085"

  # Logging
  RUST_LOG: "info,tower_http=info"
  ASPNETCORE_ENVIRONMENT: "Production"

  # JWT
  JWT_ISSUER: "central-auth"
  JWT_AUDIENCE: "central"
