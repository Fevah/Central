apiVersion: v1
kind: ResourceQuota
metadata:
  name: central-quota
  namespace: central
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    pods: "30"
    services: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: central-limits
  namespace: central
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
    - type: PersistentVolumeClaim
      min:
        storage: 100Mi
      max:
        storage: 50Gi
