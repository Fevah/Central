# =============================================================================
# Central Platform Services — All microservices in K8s
# =============================================================================

# --- Central API (.NET) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-api
  namespace: central
  labels: &api-labels
    app: central-api
    app.kubernetes.io/part-of: central-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: central-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels: *api-labels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      serviceAccountName: central-service
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432; do sleep 2; done"]
      containers:
        - name: central-api
          image: 192.168.56.10:30500/central/central-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: CENTRAL_DSN
              value: "Host=postgres;Port=5432;Database=central;Username=central;Password=central"
            - name: ASPNETCORE_URLS
              value: "http://+:5000"
            - name: CENTRAL_AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: CENTRAL_DEFAULT_TENANT_ID
              value: "00000000-0000-0000-0000-000000000001"
          envFrom:
            - secretRef:
                name: central-secrets
                optional: true
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          livenessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: central-api
  namespace: central
spec:
  type: LoadBalancer
  selector:
    app: central-api
  ports:
    - port: 5000
      targetPort: 5000
      name: http

---
# --- Task Service (Rust) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: central
  labels:
    app: task-service
    app.kubernetes.io/part-of: central-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
        app.kubernetes.io/part-of: central-platform
    spec:
      serviceAccountName: central-service
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432; do sleep 2; done"]
      containers:
        - name: task-service
          image: 192.168.56.10:30500/central/task-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: DATABASE_URL
              value: "postgres://central:central@postgres:5432/central"
            - name: TASK_SERVICE_PORT
              value: "8085"
            - name: RUST_LOG
              value: "task_service=info,tower_http=info,sqlx=warn"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health, port: 8085 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8085 }
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: central
spec:
  type: ClusterIP
  selector:
    app: task-service
  ports:
    - port: 8085
      targetPort: 8085
