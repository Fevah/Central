  namespace: central
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: central
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
