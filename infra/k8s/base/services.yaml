# --- Auth Service (Rust) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: central
  labels: &auth-labels
    app: auth-service
    app.kubernetes.io/part-of: central-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels: *auth-labels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: central-service
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432 -d secure_auth; do sleep 2; done"]
      containers:
        - name: auth-service
          image: 192.168.56.10:30500/central/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DATABASE_HOST
              value: "postgres"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "secure_auth"
            - name: DATABASE_USER
              value: "central"
            - name: DATABASE_PASSWORD
              value: "central"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: AUTH__JWT__SIGNING_KEY
              value: "Central-Auth-Shared-JWT-Key-Override-This-In-Production-32bytes!"
            - name: AUTH__JWT__ISSUER
              value: "central-auth"
            - name: AUTH__JWT__AUDIENCE
              value: "central"
            - name: AUTH__ENCRYPTION__KEY
              value: "Q2VudHJhbC1BdXRoLUVuY3J5cHRpb24tS2V5LTMyYnl0ZXMh"
            - name: AUTH__SERVER__PORT
              value: "8081"
            - name: RUST_LOG
              value: "auth_service=info,tower_http=info"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          startupProbe:
            httpGet: { path: /health, port: 8081 }
            failureThreshold: 24
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8081 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8081 }
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: central
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
      name: http

---
# --- HPA for elastic scaling ---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: central-api-hpa
  namespace: central
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: central-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: central
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }

---
# --- API Gateway (Rust) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: central
  labels:
    app: gateway
    app.kubernetes.io/part-of: central-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/part-of: central-platform
    spec:
      serviceAccountName: central-service
      containers:
        - name: gateway
          image: 192.168.56.10:30500/central/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: GATEWAY_PORT
              value: "8000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: CENTRAL_API_URL
              value: "http://central-api:5000"
            - name: AUTH_SERVICE_JWT_SECRET
              value: "Central-Auth-Shared-JWT-Key-Override-This-In-Production-32bytes!"
            - name: RUST_LOG
              value: "gateway_service=info,tower_http=info"
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /ready, port: 8000 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: central
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: central
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }

---
