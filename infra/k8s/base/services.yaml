            - name: STORAGE__MINIO__SECRET_KEY
              value: "minioadmin"
            - name: STORAGE__MINIO__REGION
              value: "us-east-1"
            - name: STORAGE__MINIO__DEFAULT_BUCKET
              value: "central-storage"
            - name: STORAGE__MINIO__FORCE_PATH_STYLE
