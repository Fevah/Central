---
# Pod Disruption Budgets — zero-downtime deploys
# Ensures at least 1 pod stays running during voluntary disruptions
# (node drain, rolling update, cluster upgrade).

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: central-api-pdb
  namespace: central
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: central-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: central
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway
