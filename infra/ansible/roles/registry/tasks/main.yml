---
# Local container registry on master node for pushing built images

- name: Deploy local registry in K8s
  become_user: vagrant
  shell: |
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Namespace
    metadata:
      name: registry
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: registry
      namespace: registry
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: registry
      template:
        metadata:
          labels:
            app: registry
        spec:
          containers:
            - name: registry
              image: registry:2
              ports:
                - containerPort: 5000
              volumeMounts:
                - name: data
                  mountPath: /var/lib/registry
              env:
                - name: REGISTRY_STORAGE_DELETE_ENABLED
                  value: "true"
          volumes:
            - name: data
              emptyDir:
                sizeLimit: 20Gi
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: registry
      namespace: registry
    spec:
      type: NodePort
      selector:
        app: registry
      ports:
        - port: 5000
          targetPort: 5000
          nodePort: 30500
    EOF

- name: Configure containerd to trust local registry
  copy:
    dest: /etc/containerd/certs.d/{{ k8s_master_ip }}:30500/hosts.toml
    content: |
      [host."http://{{ k8s_master_ip }}:30500"]
        capabilities = ["pull", "resolve", "push"]
        skip_verify = true
    mode: '0644'
  delegate_to: "{{ item }}"
  loop: "{{ groups['k8s'] }}"

- name: Restart containerd on all nodes
  systemd:
    name: containerd
    state: restarted
  delegate_to: "{{ item }}"
  loop: "{{ groups['k8s'] }}"
