name: PR Validation

on:
  pull_request:
    branches: [main, develop]

# Per-job path filters skip unrelated work on a PR. Each job runs only
# if the paths it owns changed; otherwise it's skipped (not failed).
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      angular: ${{ steps.filter.outputs.angular }}
      terraform: ${{ steps.filter.outputs.terraform }}
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - 'apps/desktop/**'
              - 'services/api/**'
              - 'libs/**'
              - 'modules/**'
              - 'tests/dotnet/**'
              - 'Central.sln'
              - 'NuGet.config'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
            angular:
              - 'apps/web/**'
            terraform:
              - 'infra/terraform/**'
              - 'infra/modules/**'
              - 'infra/environments/**'
              - 'infra/terragrunt.hcl'
            sql:
              - 'db/migrations/**'

  dotnet:
    name: .NET Build + Test
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build Central.sln -c Release -p:Platform=x64
      - run: dotnet test tests/dotnet/ -c Release -p:Platform=x64 --no-build

  angular:
    name: Angular Build
    needs: changes
    if: needs.changes.outputs.angular == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci && npx ng build --configuration production

  terraform:
    name: Terraform Validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: |
          for mod in infra/modules/*/; do
            cd "$mod" && terraform init -backend=false && terraform validate && cd "$GITHUB_WORKSPACE"
          done

  sql-lint:
    name: SQL Migration Lint
    needs: changes
    if: needs.changes.outputs.sql == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration numbering
        run: |
          prev=0
          for f in db/migrations/*.sql; do
            num=$(basename "$f" | grep -oP '^\d+')
            if [ "$num" -le "$prev" ]; then
              echo "ERROR: Migration $f has non-sequential number ($num <= $prev)"
              exit 1
            fi
            prev=$num
          done
          echo "All $prev migrations sequential"
