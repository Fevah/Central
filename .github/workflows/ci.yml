name: Central Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  RUST_VERSION: '1.92'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/central

jobs:
  # Detect which paths changed. Downstream jobs only run if their owned
  # paths actually touched — unrelated doc-only / infra-only changes
  # don't rebuild the entire platform.
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      angular: ${{ steps.filter.outputs.angular }}
      rust: ${{ steps.filter.outputs.rust }}
      terraform: ${{ steps.filter.outputs.terraform }}
      container: ${{ steps.filter.outputs.container }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - 'apps/desktop/**'
              - 'services/api/**'
              - 'libs/**'
              - 'modules/**'
              - 'tests/dotnet/**'
              - 'Central.sln'
              - 'NuGet.config'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
            angular:
              - 'apps/web/**'
            rust:
              - 'services/*/src/**'
              - 'services/*/Cargo.toml'
              - 'services/*/Cargo.lock'
            terraform:
              - 'infra/terraform/**'
              - 'infra/modules/**'
              - 'infra/environments/**'
              - 'infra/terragrunt.hcl'
            container:
              - 'services/api/Containerfile'
              - 'apps/desktop/**'
              - 'services/api/**'
              - 'libs/**'
              - 'modules/**'
              - 'NuGet.config'

  # ── .NET (Desktop + API) ────────────────────────────────────────────
  dotnet-build-test:
    name: .NET Build & Test
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore Central.sln
      - run: dotnet build Central.sln -c Release -p:Platform=x64 --no-restore
      - run: dotnet test tests/dotnet/ -c Release -p:Platform=x64 --no-build -v normal
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/dotnet/TestResults/

  # ── Angular Web Client ──────────────────────────────────────────────
  angular-build:
    name: Angular Build
    needs: changes
    if: needs.changes.outputs.angular == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci && npx ng build --configuration production
      - uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: apps/web/dist/

  # ── Rust Services ───────────────────────────────────────────────────
  rust-check:
    name: Rust Check & Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev cmake protobuf-compiler
      - name: Cargo check all Rust services
        run: |
          # Build every service that has a Cargo.toml under services/.
          # Currently that's tenant-provisioner; more will land here.
          for svc in services/*/Cargo.toml; do
            dir=$(dirname "$svc")
            echo "=== $dir ==="
            (cd "$dir" && cargo check --all-targets)
            (cd "$dir" && cargo clippy --all-targets -- -D warnings)
          done

  # ── Terraform Validate ──────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14'
      - name: Validate all modules
        run: |
          for mod in infra/modules/*/; do
            echo "Validating $mod..."
            cd "$mod"
            terraform init -backend=false
            terraform validate
            cd "$GITHUB_WORKSPACE"
          done

  # ── Security Scanning ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: [changes, dotnet-build-test]
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.container == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # .NET dependency audit (NuGet vulnerabilities)
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: NuGet vulnerability audit
        run: |
          dotnet restore Central.sln
          dotnet list Central.sln package --vulnerable --include-transitive 2>&1 | tee nuget-audit.txt
          # Fail if critical/high vulnerabilities found
          if grep -qE "(Critical|High)" nuget-audit.txt; then
            echo "::error::Critical or high severity NuGet vulnerabilities found"
            exit 1
          fi

      # npm audit (Angular web client)
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit
        run: |
          cd apps/web
          npm ci
          npm audit --audit-level=high || true

      # Trivy container image scan (runs after build)
      - name: Build API image for scanning
        run: docker build -f services/api/Containerfile -t central-api:scan .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: 'central-api:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # Secret detection (gitleaks)
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container Images ────────────────────────────────────────────────
  container-images:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    needs: [changes, dotnet-build-test, angular-build, rust-check]
    # Only publish on main, and only when something that affects the
    # image actually changed. Angular/Rust jobs may have skipped (if:
    # false) — that's fine, `always()` lets this job run as long as
    # they didn't fail.
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.container == 'true' &&
      needs.dotnet-build-test.result == 'success' &&
      (needs.angular-build.result == 'success' || needs.angular-build.result == 'skipped') &&
      (needs.rust-check.result == 'success' || needs.rust-check.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Central API (.NET)
      - name: Build Central.Api
        run: |
          docker build -f services/api/Containerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/central-api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/central-api:latest \
            .
      - name: Push Central.Api
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/central-api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/central-api:latest

  # ── K8s Deploy (manual trigger) ─────────────────────────────────────
  deploy-k8s:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: [container-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
      - name: Deploy manifests
        run: kubectl apply -k infra/k8s/base/
      - name: Rollout restart
        run: |
          # Currently only central-api is deployed from this repo. Gateway /
          # auth-service / task-service are planned Rust services that don't
          # yet exist — add lines here as each ships.
          kubectl -n central rollout restart deployment/central-api
      - name: Verify
        run: |
          kubectl -n central rollout status deployment/central-api --timeout=120s
          kubectl -n central get pods -n central
